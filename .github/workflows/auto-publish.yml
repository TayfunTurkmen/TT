name: Auto Publish Scheduled Posts

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "SITE_URL or CRON_SECRET missing"
            exit 1
          fi
          curl -sS -X POST "$SITE_URL/api/cron/publish" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
