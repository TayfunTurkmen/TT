name: Auto Publish Scheduled Posts

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ secrets.SITE_URL != '' && secrets.CRON_SECRET != '' }}
    steps:
      - name: Trigger publish endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --retry 2 --retry-delay 2 -sS -X POST "$SITE_URL/api/cron/publish" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
